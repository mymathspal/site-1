<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="cON">
    <link rel="stylesheet" href="gallery_styles.css">
    <title>Gallery</title>
</head>
<body>
    <header>
        <nav class="nav-bar">
            <div class="logo-box">
                <img src="" alt="Coventry block paving cleaners logo" class="logo">
            </div>
            <div class="menu-btn-box">
                <button type="button" class="menu-btn">Menu</button>
            </div>
            <div class="nav-links-box">
                <a href="index.html" id="home">Home</a>
                <a href="" id="about">About</a>
                <a href="" id="testimonials">Testimonials</a>
                <a href="contact.html" id="contact">Contact</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="page-intro">
            <h1 class="hero-text">Gallery</h1>
            <p class="hero-subText"></p>
        </section>

        <template class="pic-modal-template">

            <dialog class="pic-modal">
                <button class="close-btn">&times;</button>
                <img src="" alt="" class="modal-image" fetchpriority="high">
                <button class="prev-btn">&ShortLeftArrow;</button>
                <button class="next-btn">&ShortRightArrow;</button>
            </dialog>

        </template>

        <section class="gallery-section">
            <div class="pic-card"><img src="gallery-1.png" alt="" class="pic" fetchpriority="high"><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-3.png" alt="" class="pic"  fetchpriority="high"><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-4.png" alt="" class="pic"  fetchpriority="high"><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-5.png" alt="" class="pic" loading="lazy"><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-6.png" alt="" class="pic" loading="lazy"><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-7.png" alt="" class="pic" loading="lazy"><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-8.png" alt="" class="pic" loading="lazy"><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-9.png" alt="" class="pic" loading="lazy"><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-10.png" alt="" class="pic"  ><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-11.png" alt="" class="pic"  ><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-12.png" alt="" class="pic" ><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-13.png" alt="" class="pic" ><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-14.png" alt="" class="pic" ><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-16.png" alt="" class="pic" ><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-17.png" alt="" class="pic" ><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-18.png" alt="" class="pic" ><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-19.png" alt="" class="pic" ><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-20.png" alt="" class="pic" ><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-2.png" alt="" class="pic"  ><p class="img-description"></p></div>
            <div class="pic-card"><img src="gallery-15.png" alt="" class="pic" ><p class="img-description"></p></div>  
        </section>
    </main>

    <footer class="footer">
        <p class="footer-copyright-text">&copy; 2026 Coventry Block Paving Cleaners</p>
        <p class="web-designer"><a href="https://mymathspal.github.io/enkabwebdesign.github.io" target="_blank" rel="noopener noreferrer">enkab</a></p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
